name: redpanda-pr-bk-dispatch
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'src/v/**'
      - 'src/go/rpk/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'install-dependencies.sh'
      - '.github/workflows/trigger-redpanda-bk.yml'

jobs:
  redpanda-pr-bk-dispatch:
    if: github.event.pull_request.draft == false
    name: Dispatch to trigger redpanda BK pipeline
    runs-on: ubuntu-latest
    steps:
      - name: redpanda buildkite job dispatch
        uses: peter-evans/repository-dispatch@v2
        with:
          event-type: redpanda-bk-trigger
          client-payload: |
            {
              "commit": "${{ github.event.client_payload.pull_request.head.sha }}",
              "message": "${{ github.event.client_payload.pull_request.title }}",
              "branch": "${{ github.actor }}:${{ github.head_ref }}",
              "pull_request_base_branch": ${{ github.base_ref }}",
              "pull_request_id": "${{ github.event.client_payload.pull_request.number }}",
              "pull_request_repo": "${{ github.event.client_payload.pull_request.repo.html_url }}"
            }
